<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Weakness Analysis</title>

<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>

<header>
    <div class="logo">🧠 AI Weakness Analysis</div>
</header>

<section class="hero">

<h1>Analyze Your Performance</h1>

<div class="feature-card">

<input
type="number"
id="bioMarks"
placeholder="Biology Marks (%)">

<br><br>

<input
type="number"
id="chemMarks"
placeholder="Chemistry Marks (%)">

<br><br>

<input
type="number"
id="phyMarks"
placeholder="Physics Marks (%)">

<br><br>

<button
class="btn primary"
onclick="analyzePerformance()">

Analyze Now

</button>

</div>

<div
id="analysisResult"
class="lesson-output">

Your AI Report will appear here...

</div>

</section>

<script src="app.js"></script>

</body>
</html>
