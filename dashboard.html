<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Dashboard | NEET Learning Hub</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">📊 NEET Learning Dashboard</div>

    <nav class="nav">
        <a href="index.html">🏠 Home</a>
    </nav>
</header>

<section class="features">

    <div class="feature-card">
        <h2>🏆 Total XP</h2>
        <h1 id="xpValue">0</h1>
    </div>

    <div class="feature-card">
        <h2>📚 Lessons Completed</h2>
        <h1 id="lessonValue">0</h1>
    </div>

    <div class="feature-card">
        <h2>🧠 Quizzes Completed</h2>
        <h1 id="quizValue">0</h1>
    </div>

    <div class="feature-card">
        <h2>🔥 Daily Streak</h2>
        <h1 id="streakValue">0</h1>
    </div>

    <div class="feature-card">
        <h2>🎖 Badge</h2>
        <h1 id="badgeValue">🌱 Beginner</h1>
    </div>

    <div class="feature-card">

        <h2>⭐ Level</h2>

        <h1 id="levelValue">Level 1</h1>

        <div class="progress">
            <div id="progressBar"></div>
        </div>

        <br>

        <p id="progressText"></p>

    </div>

</section>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="dashboard.js"></script>
</body>
</html>
