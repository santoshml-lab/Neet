<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Quiz | NEET Learning Hub</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
    <div class="logo">🧠 AI Quiz</div>
</header>

<section class="features">

<div class="feature-card">

<h2>Generate Quiz</h2>

<input
type="text"
id="quizInput"
placeholder="Enter Topic">

<button
class="btn primary"
onclick="generateQuiz()">
Generate Quiz
</button>

<div id="quizResult">
Quiz will appear here...
</div>
<button class="btn primary" onclick="checkAnswer('A')">A</button>

<button class="btn primary" onclick="checkAnswer('B')">B</button>

<button class="btn primary" onclick="checkAnswer('C')">C</button>

<button class="btn primary" onclick="checkAnswer('D')">D</button>

<br><br>

<button class="btn secondary" onclick="nextQuestion()">
Next Question
</button>    

</div>

</section>

<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script src="app.js"></script>

</body>
</html>
